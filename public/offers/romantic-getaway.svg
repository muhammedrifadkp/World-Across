<svg width="400" height="192" viewBox="0 0 400 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4"/>
      <stop offset="50%" style="stop-color:#FF1493"/>
      <stop offset="100%" style="stop-color:#8B008B"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4B0082"/>
      <stop offset="100%" style="stop-color:#2F4F4F"/>
    </linearGradient>
    <linearGradient id="lake" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4" opacity="0.3"/>
      <stop offset="100%" style="stop-color:#4169E1"/>
    </linearGradient>
  </defs>
  
  <!-- Sunset Sky -->
  <rect width="400" height="192" fill="url(#sunset)"/>
  
  <!-- Mountains -->
  <path d="M0 100 L100 40 L200 100 Z" fill="url(#mountain)"/>
  <path d="M150 100 L250 50 L350 100 Z" fill="url(#mountain)" opacity="0.8"/>
  <path d="M300 100 L400 60 L400 100 Z" fill="url(#mountain)" opacity="0.6"/>
  
  <!-- Lake -->
  <ellipse cx="200" cy="140" rx="150" ry="30" fill="url(#lake)"/>
  
  <!-- Moon -->
  <circle cx="80" cy="50" r="18" fill="#F0F8FF" opacity="0.9"/>
  <circle cx="85" cy="45" r="3" fill="#E6E6FA" opacity="0.7"/>
  <circle cx="75" cy="55" r="2" fill="#E6E6FA" opacity="0.7"/>
  
  <!-- Stars -->
  <circle cx="120" cy="30" r="1.5" fill="white"/>
  <circle cx="160" cy="25" r="1" fill="white"/>
  <circle cx="200" cy="35" r="1.5" fill="white"/>
  <circle cx="280" cy="20" r="1" fill="white"/>
  <circle cx="320" cy="40" r="1.5" fill="white"/>
  <circle cx="350" cy="25" r="1" fill="white"/>
  
  <!-- Romantic Couple Silhouette -->
  <g transform="translate(180, 120)">
    <!-- Male figure -->
    <circle cx="0" cy="0" r="6" fill="#2F4F4F"/>
    <rect x="-4" y="6" width="8" height="15" fill="#2F4F4F"/>
    <rect x="-6" y="21" width="5" height="12" fill="#2F4F4F"/>
    <rect x="1" y="21" width="5" height="12" fill="#2F4F4F"/>
    
    <!-- Female figure -->
    <circle cx="15" cy="0" r="6" fill="#2F4F4F"/>
    <rect x="11" y="6" width="8" height="15" fill="#2F4F4F"/>
    <rect x="9" y="21" width="5" height="12" fill="#2F4F4F"/>
    <rect x="16" y="21" width="5" height="12" fill="#2F4F4F"/>
    
    <!-- Holding hands -->
    <line x1="4" y1="12" x2="11" y2="12" stroke="#2F4F4F" stroke-width="2"/>
  </g>
  
  <!-- Romantic Cabin -->
  <rect x="50" y="110" width="40" height="30" fill="#8B4513"/>
  <path d="M45 110 L70 95 L95 110 Z" fill="#654321"/>
  <rect x="60" y="120" width="8" height="12" fill="#FFD700"/>
  <rect x="75" y="120" width="8" height="12" fill="#FFD700"/>
  <rect x="65" y="125" width="6" height="7" fill="#8B4513"/>
  
  <!-- Pine Trees -->
  <path d="M20 140 L25 120 L30 140 Z" fill="#228B22"/>
  <path d="M18 135 L25 115 L32 135 Z" fill="#32CD32"/>
  <rect x="23" y="140" width="4" height="10" fill="#8B4513"/>
  
  <path d="M350 140 L355 120 L360 140 Z" fill="#228B22"/>
  <path d="M348 135 L355 115 L362 135 Z" fill="#32CD32"/>
  <rect x="353" y="140" width="4" height="10" fill="#8B4513"/>
  
  <!-- Hearts -->
  <g transform="translate(200, 80)">
    <path d="M0,5 C0,2 3,0 6,3 C9,0 12,2 12,5 C12,8 6,14 6,14 C6,14 0,8 0,5 Z" fill="#FF69B4" opacity="0.7"/>
  </g>
  <g transform="translate(250, 60)">
    <path d="M0,3 C0,1 2,0 4,2 C6,0 8,1 8,3 C8,5 4,9 4,9 C4,9 0,5 0,3 Z" fill="#FF1493" opacity="0.6"/>
  </g>
  
  <!-- Romantic Text -->
  <text x="200" y="25" text-anchor="middle" fill="#FFB6C1" font-family="serif" font-size="14" font-weight="bold">ROMANTIC ESCAPE</text>
</svg>
